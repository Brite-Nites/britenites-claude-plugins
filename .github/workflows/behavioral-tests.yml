name: Behavioral Tests (Tier 2+3)

# Budget: ~$2-5 per run. Runs 2x/week + manual trigger.
# See docs/research/behavioral-testing-evaluation.md for cost model.

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Run a single test case (e.g., B01). Leave blank for all."
        required: false
        default: ""
      trials:
        description: "Trials per test for non-determinism handling"
        required: false
        default: "1"
  schedule:
    - cron: "0 6 * * 1,4" # Mon+Thu 6am UTC

env:
  EVALS: "1"
  EVALS_MODEL: "claude-sonnet-4-6"

jobs:
  behavioral:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Run behavioral tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVALS_TRIALS: ${{ github.event.inputs.trials || '1' }}
          EVALS_FILTER: ${{ github.event.inputs.filter }}
        run: |
          if [ -n "${EVALS_FILTER}" ]; then
            # Validate filter is a safe test ID (alphanumeric + hyphens)
            if ! echo "${EVALS_FILTER}" | grep -qE '^[A-Za-z0-9_-]+$'; then
              echo "ERROR: Invalid filter value: must be alphanumeric"
              exit 1
            fi
            bash scripts/test-behavioral.sh --filter "${EVALS_FILTER}"
          else
            bash scripts/test-behavioral.sh
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-results-${{ github.run_number }}
          path: tests/evals/behavioral-*.json
          retention-days: 90

  scoring:
    runs-on: ubuntu-latest
    needs: behavioral
    if: always() && needs.behavioral.result != 'cancelled'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: behavioral-results-${{ github.run_number }}
          path: tests/evals/

      - name: Run LLM-as-judge scoring
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/score-behavioral.sh

      - name: Upload scored results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-scored-${{ github.run_number }}
          path: tests/evals/behavioral-*.json
          retention-days: 90
